<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Anagrafica Completa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
            width: 80%;
        }

        th, td {
            border: 1px solid #444;
            padding: 8px 12px;
        }

        th {
            background-color: #eee;
        }

        input, select {
            margin: 5px;
        }
    </style>
    <script>
        function aggiungi() {
            let nome = document.getElementById("nome").value;
            let cognome = document.getElementById("cognome").value;
            let indirizzo = document.getElementById("indirizzo").value;
            let citta = document.getElementById("citta").value;

            let sesso = "Non selezionato";
            let radio = document.getElementsByName("sesso");
            for (let i = 0; i < radio.length; i++) {
                if (radio[i].checked) sesso = radio[i].value;
            }

            let checkbox = document.getElementsByName("diploma");
            let diplomi = [];
            for (let i = 0; i < checkbox.length; i++) {
                if (checkbox[i].checked) diplomi.push(checkbox[i].value);
            }
            if (diplomi.length === 0) diplomi = ["Nessuno"];

            let select = document.getElementById("sport").options;
            let sportSel = [];
            for (let i = 0; i < select.length; i++) {
                if (select[i].selected) sportSel.push(select[i].value);
            }
            if (sportSel.length === 0) sportSel = ["Nessuno"];

            let persona = {
                nome: nome,
                cognome: cognome,
                indirizzo: indirizzo,
                citta: citta,
                sesso: sesso,
                diplomi: diplomi,
                sport: sportSel
            };

            let elenco = JSON.parse(localStorage.getItem("anagrafica")) || [];
            elenco.push(persona);

            localStorage.setItem("anagrafica", JSON.stringify(elenco));

            aggiornaTabella();

            document.getElementById("nome").value = "";
            document.getElementById("cognome").value = "";
            document.getElementById("indirizzo").value = "";
            document.getElementById("citta").value = "";

            for (let i = 0; i < radio.length; i++) radio[i].checked = false;
            for (let i = 0; i < checkbox.length; i++) checkbox[i].checked = false;
            document.getElementById("sport").selectedIndex = -1;
        }

        function eliminaUltima() {
            let elenco = JSON.parse(localStorage.getItem("anagrafica"));

            if (elenco && elenco.length > 0) {
                elenco.pop();
                localStorage.setItem("anagrafica", JSON.stringify(elenco));
                aggiornaTabella();
            } else {
                alert("Non ci sono righe da eliminare!");
            }
        }

        function aggiornaTabella() {
            let elenco = JSON.parse(localStorage.getItem("anagrafica")) || [];

            let tab = "<table>";
            tab += "<tr><th>Nome</th><th>Cognome</th><th>Indirizzo</th><th>Città</th><th>Sesso</th><th>Diplomi</th><th>Sport</th></tr>";

            for (let p of elenco) {
                tab += "<tr>" +
                    "<td>" + p.nome + "</td>" +
                    "<td>" + p.cognome + "</td>" +
                    "<td>" + p.indirizzo + "</td>" +
                    "<td>" + p.citta + "</td>" +
                    "<td>" + p.sesso + "</td>" +
                    "<td>" + p.diplomi.join(", ") + "</td>" +
                    "<td>" + p.sport.join(", ") + "</td>" +
                    "</tr>";
            }

            tab += "</table>";
            document.getElementById("risultato").innerHTML = tab;
        }

        window.onload = aggiornaTabella;
    </script>
</head>

<body>
    <h2>Anagrafica Completa</h2>

    <label>Nome: <input type="text" id="nome" value="gabriel"></label><br>
    <label>Cognome: <input type="text" id="cognome" value="kolndreu"></label><br>
    <label>Indirizzo: <input type="text" id="indirizzo" value="Via mozart 14"></label><br>
    <label>Città: <input type="text" id="citta" value="Bollate"></label><br><br>

    <h3>Sesso:</h3>
    <input type="radio" name="sesso" value="Maschio" checked> Maschio<br>
    <input type="radio" name="sesso" value="Femmina"> Femmina<br>
    <input type="radio" name="sesso" value="Altro"> Altro<br><br>

    <h3>Diplomi posseduti:</h3>
    <input type="checkbox" name="diploma" value="Nessun titolo"> Nessun titolo<br>
    <input type="checkbox" name="diploma" value="Laurea" checked> Laurea<br>
    <input type="checkbox" name="diploma" value="Master"> Master<br><br>

    <h3>Sport praticati:</h3>
    <select id="sport" multiple size="4">
        <option value="Calcio" selected>Calcio</option>
        <option value="Basket">Basket</option>
        <option value="Palestra">Palestra</option>
        <option value="Nuoto">Nuoto</option>
    </select><br><br>

    <button onclick="aggiungi()">Aggiungi</button>
    <button onclick="eliminaUltima()">Elimina ultima riga</button>

    <h3>Visualizza tabella:</h3>
    <button onclick="aggiornaTabella()">Mostra tabella completa</button>

    <div id="risultato"></div>
</body>

</html>
